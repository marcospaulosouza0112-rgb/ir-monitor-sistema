<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Consulta de Declaração — Connex Soluções Contábeis</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F7F6F2;color:#1A1916;min-height:100vh;display:flex;flex-direction:column}
h1,h2,h3{font-family:'Syne',sans-serif}

.header{background:#1A1916;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header-logo{color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.header-logo span{color:#97C459;font-size:11px;display:block;font-weight:400;margin-top:1px}

.container{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px}

/* Tela de login */
.login-card{background:#fff;border:1px solid #E2E1DA;border-radius:16px;padding:40px;width:100%;max-width:420px;text-align:center}
.login-icon{width:56px;height:56px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px}
.login-card h2{font-size:20px;font-weight:600;margin-bottom:6px}
.login-card p{font-size:13px;color:#6B6A65;margin-bottom:28px;line-height:1.6}
.form-group{margin-bottom:16px;text-align:left}
.form-label{display:block;font-size:11px;font-weight:600;color:#6B6A65;margin-bottom:6px;font-family:'Syne',sans-serif;letter-spacing:0.3px}
.form-input{width:100%;padding:11px 14px;border:1px solid #D0CFC8;border-radius:8px;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;color:#1A1916;transition:border 0.15s;letter-spacing:1px}
.form-input:focus{border-color:#378ADD}
.btn-consultar{width:100%;padding:12px;background:#1A1916;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.15s;margin-top:4px}
.btn-consultar:hover{background:#333}
.btn-consultar:disabled{opacity:0.6;cursor:not-allowed}
.erro-msg{background:#FCEBEB;color:#A32D2D;border:1px solid #F7C1C1;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}

/* Tela de resultado */
.result-card{background:#fff;border:1px solid #E2E1DA;border-radius:16px;padding:32px;width:100%;max-width:560px}
.result-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #E2E1DA}
.result-avatar{width:48px;height:48px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#185FA5;flex-shrink:0}
.result-nome{font-size:16px;font-weight:600;font-family:'Syne',sans-serif}
.result-cpf{font-size:12px;color:#6B6A65;font-family:monospace;margin-top:2px}

.status-block{border-radius:12px;padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.status-block.verde{background:#EAF3DE;border:1px solid #C0DD97}
.status-block.azul{background:#E6F1FB;border:1px solid #B5D4F4}
.status-block.vermelho{background:#FCEBEB;border:1px solid #F7C1C1}
.status-block.amarelo{background:#FAEEDA;border:1px solid #FAC775}
.status-block.cinza{background:#F1EFE8;border:1px solid #D3D1C7}
.status-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.status-block.verde .status-icon{background:#C0DD97}
.status-block.azul .status-icon{background:#B5D4F4}
.status-block.vermelho .status-icon{background:#F7C1C1}
.status-block.amarelo .status-icon{background:#FAC775}
.status-block.cinza .status-icon{background:#D3D1C7}
.status-label{font-size:11px;font-weight:600;font-family:'Syne',sans-serif;letter-spacing:0.5px;margin-bottom:4px}
.status-block.verde .status-label{color:#3B6D11}
.status-block.azul .status-label{color:#185FA5}
.status-block.vermelho .status-label{color:#A32D2D}
.status-block.amarelo .status-label{color:#854F0B}
.status-block.cinza .status-label{color:#5F5E5A}
.status-valor{font-size:18px;font-weight:700;font-family:'Syne',sans-serif}
.status-block.verde .status-valor{color:#3B6D11}
.status-block.azul .status-valor{color:#185FA5}
.status-block.vermelho .status-valor{color:#A32D2D}
.status-block.amarelo .status-valor{color:#854F0B}
.status-block.cinza .status-valor{color:#5F5E5A}
.status-detalhe{font-size:12px;margin-top:3px;opacity:0.8}

.restit-box{background:#EAF3DE;border:1px solid #C0DD97;border-radius:10px;padding:16px;margin-bottom:20px}
.restit-title{font-size:11px;font-weight:600;color:#3B6D11;font-family:'Syne',sans-serif;letter-spacing:0.4px;margin-bottom:8px}
.restit-valor{font-size:28px;font-weight:700;color:#3B6D11;font-family:'Syne',sans-serif}
.restit-info{font-size:12px;color:#639922;margin-top:4px}

.historico-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:12px;color:#1A1916}
.hist-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #F0EFE9}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.hist-status{font-size:13px;font-weight:500}
.hist-detalhe{font-size:11px;color:#6B6A65;margin-top:2px}
.hist-data{font-size:11px;color:#A8A7A3;margin-top:2px}
.hist-origem{font-size:10px;padding:1px 7px;border-radius:10px;display:inline-block;margin-top:3px;font-weight:600}
.hist-origem.auto{background:#E6F1FB;color:#185FA5}
.hist-origem.manual{background:#F1EFE8;color:#5F5E5A}

.atualizado{font-size:11px;color:#A8A7A3;text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid #F0EFE9}
.btn-voltar{background:none;border:1px solid #D0CFC8;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#6B6A65;font-family:'DM Sans',sans-serif;margin-top:16px;width:100%;transition:all 0.15s}
.btn-voltar:hover{background:#F0EFE9}

.footer{background:#1A1916;padding:16px 24px;text-align:center}
.footer p{font-size:11px;color:rgba(255,255,255,0.3)}
.footer span{color:#97C459}

.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:20px;color:#6B6A65;font-size:13px}
.spinner{width:18px;height:18px;border:2px solid #E2E1DA;border-top-color:#1A1916;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    Connex Soluções Contábeis
    <span>Portal do Cliente — IRPF 2026</span>
  </div>
</div>

<div class="container">
  <!-- Tela de login -->
  <div class="login-card" id="login-screen">
    <div class="login-icon">📋</div>
    <h2>Consultar minha declaração</h2>
    <p>Digite seu CPF para acessar o status da sua declaração de Imposto de Renda 2026.</p>
    <div class="form-group">
      <label class="form-label">Seu CPF</label>
      <input class="form-input" id="cpf-input" type="text" placeholder="000.000.000-00" maxlength="14" oninput="formatarCPF(this)"/>
    </div>
    <button class="btn-consultar" id="btn-consultar" onclick="consultar()">Consultar</button>
    <div class="erro-msg" id="erro-msg"></div>
  </div>

  <!-- Tela de resultado -->
  <div class="result-card" id="result-screen" style="display:none">
    <div id="result-content"></div>
    <button class="btn-voltar" onclick="voltar()">← Nova consulta</button>
  </div>
</div>

<div class="footer">
  <p>Connex Soluções Contábeis — <span>Sistema IR Monitor</span> — Seus dados estão seguros</p>
</div>

<script>
const token = window.location.pathname.split('/cliente/')[1];

function formatarCPF(input) {
  let v = input.value.replace(/\D/g, '').substring(0, 11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{0,3})/, '$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{0,3})/, '$1.$2');
  input.value = v;
}

document.getElementById('cpf-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') consultar();
});

async function consultar() {
  const cpf = document.getElementById('cpf-input').value.trim();
  if (cpf.length < 14) {
    mostrarErro('Digite um CPF válido com 11 dígitos.');
    return;
  }

  const btn = document.getElementById('btn-consultar');
  btn.disabled = true;
  btn.textContent = 'Consultando...';
  esconderErro();

  try {
    const r = await fetch(`/api/cliente/${token}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cpf })
    });
    const data = await r.json();

    if (!r.ok || data.erro) {
      mostrarErro(data.erro || 'CPF não confere. Verifique e tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Consultar';
      return;
    }

    mostrarResultado(data);
  } catch (e) {
    mostrarErro('Erro de conexão. Tente novamente em instantes.');
    btn.disabled = false;
    btn.textContent = 'Consultar';
  }
}

function statusConfig(status) {
  const m = {
    'Restituição':        { cls:'verde',    icon:'💰', label:'RESTITUIÇÃO APROVADA' },
    'Transmitida':        { cls:'azul',     icon:'📤', label:'DECLARAÇÃO TRANSMITIDA' },
    'Em processamento':   { cls:'amarelo',  icon:'⏳', label:'EM PROCESSAMENTO' },
    'Aguardando envio':   { cls:'amarelo',  icon:'📝', label:'AGUARDANDO ENVIO' },
    'Aguardando contato': { cls:'cinza',    icon:'📞', label:'AGUARDANDO CONTATO' },
    'Malha fina':         { cls:'vermelho', icon:'⚠️', label:'RETIDA EM MALHA FINA' },
    'Falta documentos':   { cls:'vermelho', icon:'📎', label:'FALTA DOCUMENTOS' },
    'Em preenchimento':   { cls:'amarelo',  icon:'✏️', label:'EM PREENCHIMENTO' },
    'IR a pagar':         { cls:'azul',     icon:'📄', label:'IR A PAGAR' },
    'Concluída':          { cls:'azul',     icon:'✅', label:'CONCLUÍDA' },
    'Isento':             { cls:'cinza',    icon:'🔖', label:'ISENTO' },
    'Não obrigado':       { cls:'cinza',    icon:'🔖', label:'NÃO OBRIGADO' },
  };
  return m[status] || { cls:'cinza', icon:'📋', label:status.toUpperCase() };
}

function dotColor(status) {
  const m = {
    'Restituição':'#639922','Transmitida':'#378ADD','IR a pagar':'#378ADD','Concluída':'#378ADD',
    'Malha fina':'#E24B4A','Falta documentos':'#E24B4A',
    'Em processamento':'#BA7517','Aguardando envio':'#BA7517','Em preenchimento':'#BA7517',
    'Aguardando contato':'#888780','Isento':'#888780','Não obrigado':'#888780',
  };
  return m[status] || '#888780';
}

function mostrarResultado(data) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const cfg = statusConfig(data.status);
  const iniciais = data.nome.split(' ').slice(0,2).map(n=>n[0]).join('');

  let restituicaoHtml = '';
  if (data.status === 'Restituição' && (data.valor_restit || data.lote)) {
    restituicaoHtml = `
      <div class="restit-box">
        <div class="restit-title">💰 VALOR DA RESTITUIÇÃO</div>
        ${data.valor_restit ? `<div class="restit-valor">${data.valor_restit}</div>` : ''}
        ${data.lote ? `<div class="restit-info">Lote ${data.lote} — Crédito em conta</div>` : ''}
      </div>
    `;
  }

  const historicoHtml = (data.historico||[]).map(h => `
    <div class="hist-item">
      <div class="hist-dot" style="background:${dotColor(h.status)}"></div>
      <div>
        <div class="hist-status">${h.status}</div>
        ${h.detalhe ? `<div class="hist-detalhe">${h.detalhe}</div>` : ''}
        <div class="hist-data">${h.data ? h.data.split(' ')[0] : ''}</div>
        <span class="hist-origem ${h.origem==='automatico'?'auto':'manual'}">${h.origem==='automatico'?'atualizado automaticamente':'atualizado pelo escritório'}</span>
      </div>
    </div>
  `).join('');

  document.getElementById('result-content').innerHTML = `
    <div class="result-header">
      <div class="result-avatar">${iniciais}</div>
      <div>
        <div class="result-nome">${data.nome}</div>
        <div class="result-cpf">${data.cpf} · IRPF ${data.ano}</div>
      </div>
    </div>

    <div class="status-block ${cfg.cls}">
      <div class="status-icon">${cfg.icon}</div>
      <div>
        <div class="status-label">${cfg.label}</div>
        <div class="status-valor">${data.status}</div>
        ${data.detalhe ? `<div class="status-detalhe">${data.detalhe.split('—')[0].trim()}</div>` : ''}
      </div>
    </div>

    ${restituicaoHtml}

    ${historicoHtml ? `
    <div class="historico-title">Histórico da declaração</div>
    <div>${historicoHtml}</div>` : ''}

    <div class="atualizado">
      Última atualização: ${data.ultima_consulta ? data.ultima_consulta.split(' ')[0] : 'não disponível'}<br>
      Em caso de dúvidas, entre em contato com a Connex Soluções Contábeis.
    </div>
  `;
}

function voltar() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('cpf-input').value = '';
  const btn = document.getElementById('btn-consultar');
  btn.disabled = false;
  btn.textContent = 'Consultar';
}

function mostrarErro(msg) {
  const el = document.getElementById('erro-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function esconderErro() {
  document.getElementById('erro-msg').style.display = 'none';
}
</script>
</body>
</html>
